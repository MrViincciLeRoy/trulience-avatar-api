<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jason</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'Helvetica Neue', 'Arial', 'sans-serif'],
          }
        }
      }
    }
  </script>
  <style>
    html, body { height: 100%; }
    #myvideo { width: 100%; height: 100%; object-fit: cover; display: block; }
  </style>
</head>
<body class="bg-gray-50 text-gray-900 flex flex-col min-h-screen">

  <!-- CONFIG SCREEN -->
  <div id="config-screen" class="flex-1 flex items-center justify-center p-6">
    <div class="bg-white border border-gray-200 rounded-2xl p-8 w-full max-w-sm shadow-sm">

      <div class="mb-6">
        <h1 class="text-2xl font-semibold tracking-tight">Jason</h1>
        <p class="text-sm text-gray-400 mt-1">Your interactive AI avatar</p>
      </div>

      <div class="space-y-4">
        <div>
          <label class="block text-xs font-medium text-gray-400 uppercase tracking-widest mb-1.5">Avatar ID</label>
          <input
            id="inp-avatar-id"
            type="text"
            value="7265192370790681411"
            class="w-full bg-gray-50 border border-gray-200 rounded-xl px-3.5 py-2.5 text-sm text-gray-900 outline-none focus:border-gray-900 transition-colors"
          />
        </div>

        <div>
          <label class="block text-xs font-medium text-gray-400 uppercase tracking-widest mb-1.5">Token</label>
          <input
            id="inp-token"
            type="text"
            placeholder="Leave blank if not required"
            class="w-full bg-gray-50 border border-gray-200 rounded-xl px-3.5 py-2.5 text-sm text-gray-900 outline-none focus:border-gray-900 transition-colors"
          />
          <p class="text-xs text-gray-400 mt-1.5">Optional — leave empty unless your avatar requires auth</p>
        </div>

        <button
          onclick="initAvatar()"
          class="w-full bg-gray-900 hover:bg-gray-700 text-white rounded-xl py-3 text-sm font-medium transition-colors mt-2"
        >
          Start conversation
        </button>
      </div>
    </div>
  </div>

  <!-- AVATAR SCREEN -->
  <div id="avatar-screen" class="hidden flex-col flex-1">

    <!-- Top bar -->
    <div class="flex items-center justify-between px-4 py-3 bg-white border-b border-gray-100">
      <div class="flex items-center gap-2.5">
        <div class="w-9 h-9 rounded-full bg-gray-100 border border-gray-200 flex items-center justify-center text-sm font-semibold text-gray-700">J</div>
        <span class="text-sm font-medium">Jason</span>
      </div>
      <div class="flex items-center gap-1.5 text-xs text-gray-400 bg-gray-50 border border-gray-200 px-3 py-1.5 rounded-full">
        <div id="status-dot" class="w-1.5 h-1.5 rounded-full bg-gray-300"></div>
        <span id="status-text">Disconnected</span>
      </div>
    </div>

    <!-- Video -->
    <div class="flex-1 bg-gray-900 relative overflow-hidden" style="min-height: 280px;">
      <video id="myvideo" webkit-playsinline playsinline crossorigin="anonymous" autoplay></video>
      <div id="video-placeholder" class="absolute inset-0 flex flex-col items-center justify-center gap-3">
        <span class="text-7xl font-semibold text-white/10">J</span>
        <span class="text-xs text-white/30 tracking-wider">Press connect to begin</span>
      </div>
    </div>

    <!-- Controls -->
    <div class="bg-white border-t border-gray-100 px-4 pt-4 pb-5 space-y-3">
      <div class="flex gap-2">
        <button id="btn-connect" onclick="startCall()"
          class="flex-1 bg-gray-900 hover:bg-gray-700 disabled:opacity-30 text-white rounded-xl py-2.5 text-sm font-medium transition-colors">
          Connect
        </button>
        <button id="btn-disconnect" onclick="endCall()" disabled
          class="flex-1 bg-red-50 hover:bg-red-100 disabled:opacity-30 text-red-600 border border-red-200 rounded-xl py-2.5 text-sm font-medium transition-colors">
          End
        </button>
        <button id="btn-mic" onclick="toggleMic()" disabled
          class="flex-1 bg-gray-50 hover:bg-gray-100 disabled:opacity-30 text-gray-700 border border-gray-200 rounded-xl py-2.5 text-sm font-medium transition-colors">
          Mic
        </button>
      </div>
      <div class="flex gap-2">
        <input id="textBox" type="text" disabled placeholder="Type a message to Jason…"
          onkeydown="if(event.key==='Enter') sendText()"
          class="flex-1 bg-gray-50 border border-gray-200 rounded-xl px-3.5 py-2.5 text-sm outline-none focus:border-gray-900 disabled:opacity-40 transition-colors" />
        <button id="btn-send" onclick="sendText()" disabled
          class="bg-gray-900 hover:bg-gray-700 disabled:opacity-30 text-white rounded-xl px-4 text-sm font-medium transition-colors">
          Send
        </button>
      </div>
    </div>

  </div>

  <script src="https://webrtc.github.io/adapter/adapter-latest.js"></script>
  <script src="https://trulience.com/sdk/trulience.sdk.js"></script>
  <script>
    let trulience = null;
    let micEnabled = false;
    let cfg = {};

    function setStatus(text, live) {
      document.getElementById('status-text').textContent = text;
      document.getElementById('status-dot').className =
        'w-1.5 h-1.5 rounded-full ' + (live ? 'bg-green-500' : 'bg-gray-300');
    }

    function setConnectedUI(connected) {
      document.getElementById('btn-connect').disabled = connected;
      document.getElementById('btn-disconnect').disabled = !connected;
      document.getElementById('btn-mic').disabled = !connected;
      document.getElementById('textBox').disabled = !connected;
      document.getElementById('btn-send').disabled = !connected;
      if (connected) document.getElementById('video-placeholder').style.display = 'none';
    }

    function initAvatar() {
      const avatarId = document.getElementById('inp-avatar-id').value.trim();
      const token = document.getElementById('inp-token').value.trim();
      if (!avatarId) { alert('Please enter an Avatar ID.'); return; }
      cfg = { avatarId, token };
      document.getElementById('config-screen').style.display = 'none';
      document.getElementById('avatar-screen').style.display = 'flex';
      setStatus('Ready', false);
    }

    function startCall() {
      setStatus('Connecting…', false);
      const builder = new TrulienceBuilder()
        .setAvatarId(cfg.avatarId)
        .setVideoElement(document.getElementById('myvideo'));
      if (cfg.token) builder.setToken(cfg.token);
      builder.setEventCallback('auth-success', () => {
        setStatus('Live', true);
        setConnectedUI(true);
        micEnabled = false;
        updateMicBtn();
      });
      builder.setEventCallback('auth-fail', err => {
        setStatus('Auth failed', false);
        console.error(err);
      });
      builder.setEventCallback('trl-avatar-disconnected', () => {
        setStatus('Disconnected', false);
        setConnectedUI(false);
        document.getElementById('video-placeholder').style.display = 'flex';
      });
      trulience = builder.build();
      trulience.connect();
    }

    function endCall() {
      if (trulience) { trulience.disconnect(); trulience = null; }
      setStatus('Disconnected', false);
      setConnectedUI(false);
      document.getElementById('video-placeholder').style.display = 'flex';
    }

    function updateMicBtn() {
      const btn = document.getElementById('btn-mic');
      if (micEnabled) {
        btn.textContent = 'Mute';
        btn.classList.remove('bg-gray-50', 'text-gray-700', 'border-gray-200');
        btn.classList.add('bg-red-50', 'text-red-600', 'border-red-200');
      } else {
        btn.textContent = 'Mic';
        btn.classList.remove('bg-red-50', 'text-red-600', 'border-red-200');
        btn.classList.add('bg-gray-50', 'text-gray-700', 'border-gray-200');
      }
    }

    function toggleMic() {
      if (!trulience) return;
      micEnabled = !micEnabled;
      trulience.setMicEnabled(micEnabled);
      updateMicBtn();
    }

    function sendText() {
      const box = document.getElementById('textBox');
      const msg = box.value.trim();
      if (!msg || !trulience) return;
      trulience.sendMessage(msg);
      box.value = '';
    }
  </script>

</body>
</html>
